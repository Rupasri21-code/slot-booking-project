{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slot Booking System</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

    <!-- Header -->
    <header class="header">
        Slot Booking System
    </header>

    <!-- Main Container -->
    <div class="container">

        <h2>Available Slots</h2>

        <div class="slots">

            <div class="slot-card">
                <span>9:00 AM</span>
                <button class="book-btn">Book Slot</button>
            </div>

            <div class="slot-card">
                <span>10:00 AM</span>
                <button class="book-btn">Book Slot</button>
            </div>

            <div class="slot-card">
                <span>11:00 AM</span>
                <button class="book-btn">Book Slot</button>
            </div>

            <div class="slot-card">
                <span>12:00 PM</span>
                <button class="book-btn">Book Slot</button>
            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        © 2026 Slot Booking Project
    </footer>

    <script src="{% static 'js/scripts.js' %}"></script>

</body>
</html>
