{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <h1>Slot Booking System</h1>
</header>

<main class="container">
    <section class="slots-section">
        <h2>Available Slots</h2>
        <div class="slots">
            {% for slot in slots %}
                <div class="slot {% if slot.is_booked %}booked{% endif %}" data-id="{{ slot.id }}">
                    <span class="slot-time">{{ slot.time }}</span>
                    <a href="#" class="toggle-link">
                        {% if slot.is_booked %}Unbook{% else %}Book Slot{% endif %}
                    </a>
                </div>
            {% endfor %}
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Slot Booking Project</p>
</footer>

<script>
document.querySelectorAll('.toggle-link').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();

        const slotDiv = this.closest('.slot');
        const slotId = slotDiv.dataset.id;

        fetch(`/toggle_ajax/${slotId}/`, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.is_booked !== undefined) {
                if(data.is_booked){
                    slotDiv.classList.add('booked');
                    this.textContent = 'Unbook';
                } else {
                    slotDiv.classList.remove('booked');
                    this.textContent = 'Book Slot';
                }
            } else if (data.error){
                alert(data.error);
            }
        })
        .catch(error => console.error('Error:', error));
    });
});
</script>

</body>
</html>
